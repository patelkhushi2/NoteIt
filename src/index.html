<!-- LOGIN PAGE. EVERYTHING HERE SHOULD BE LOGIN RELATED. -->


<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - NoteIt</title>
</head>

<body class="login-body">

  <div class = "login-container">
    <h1>Login to NoteIt</h1>
    <button id="google-login">Sign in with Google</button>
  </div>

  <script type="module">
  import { auth, provider } from "./firebase.js";
  import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  document.getElementById("google-login").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        console.log("Logged in:", result.user.email);
        window.location.href = "home.html";
      } catch (error) {
        console.error("Login error:", error);
    }
});

</script>

</body>
</html>
